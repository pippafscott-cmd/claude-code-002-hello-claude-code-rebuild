<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="card">

    <!-- Progress bar — shown across all screens -->
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
    <p class="progress-label" id="progress-text"></p>

    <!-- ── Intro screen ─────────────────────────────────── -->
    <div class="screen" id="screen-intro">
      <div class="intro-header">
        <div class="intro-avatar">🦊</div>
        <h1 id="quiz-name"></h1>
        <p id="quiz-intro"></p>
      </div>
      <div class="intro-meta">
        <span class="badge" id="question-count"></span>
      </div>
      <button class="btn btn-primary" id="btn-start">Start Quiz</button>
    </div>

    <!-- ── Question screen ──────────────────────────────── -->
    <div class="screen" id="screen-question">
      <p class="question-text" id="question-text"></p>
      <div class="options" id="options"></div>
    </div>

    <!-- ── Results screen ───────────────────────────────── -->
    <div class="screen" id="screen-results">
      <div class="results-header">
        <div class="score-ring-wrap">
          <svg viewBox="0 0 100 100" width="120" height="120">
            <circle class="score-ring-bg" cx="50" cy="50" r="45" />
            <circle class="score-ring"    cx="50" cy="50" r="45" id="score-ring" />
          </svg>
          <div class="score-label">
            <span class="score-number" id="score-number"></span>
            <span class="score-percent" id="score-percent"></span>
          </div>
        </div>
        <h2>Quiz complete!</h2>
        <p class="results-message" id="results-message"></p>
      </div>
      <button class="btn btn-secondary" id="btn-restart">Try again</button>
    </div>

  </div>

  <!-- Load questions first, then the engine -->
  <script src="questions.js"></script>
  <script src="quiz.js"></script>

</body>
</html>
